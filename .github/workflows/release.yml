name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore NNN-Solution/NNN-Solution.sln

      - name: Build ReleasePackage
        shell: cmd
        run: |
          msbuild NNN-Solution/NNN-Solution.sln ^
            /p:Configuration=ReleasePackage ^
            /p:Platform=x64

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/bin/x64/ReleasePackage/**/*.dll
        env:
          GITHUB_TOKEN: **/bin/x64/ReleasePackage/**/*.dll
