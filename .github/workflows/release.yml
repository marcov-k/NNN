name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
        with:
          nuget-version: 'latest'

      - name: Restore NuGet packages
        run: nuget restore NNN-Solution/NNN-Solution.sln

      - name: Build ReleasePackage
        shell: cmd
        run: |
          msbuild NNN-Solution/NNN-Solution.sln ^
            /p:Configuration=ReleasePackage ^
            /p:Platform=x64

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $Version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$Version" >> $env:GITHUB_OUTPUT
          echo "TAG=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT

      - name: Locate build outputs
        id: outputs
        shell: pwsh
        run: |
          $NNNCSharp = (Get-ChildItem "NNN-Solution/NNNCSharp" -Recurse -Filter NNNCSharp.dll |
            Select-Object -First 1).FullName
          $Native = (Get-ChildItem "NNN-Solution/NNNCSharp" -Recurse -Filter NNN.dll |
            Select-Object -First 1).FullName
          echo "MANAGED=$NNNCSharp" >> $env:GITHUB_OUTPUT
          echo "NATIVE=$Native" >> $env:GITHUB_OUTPUT

      - name: Prepare zip release
        shell: pwsh
        run: |
          $Version = "${{ steps.version.outputs.TAG }}"
          New-Item -ItemType Directory -Force release/NNN/Runtime | Out-Null
          Copy-Item "${{ steps.outputs.outputs.MANAGED }}" release/NNN/Runtime/
          Copy-Item "${{ steps.outputs.outputs.NATIVE }}" release/NNN/Runtime/
          Copy-Item $env:GITHUB_WORKSPACE/LICENSE.txt release/
          Copy-Item $env:GITHUB_WORKSPACE/README.md release/
          Compress-Archive -Path release/* -DestinationPath "NNN-$Version.zip"

      - name: Prepare NuGet package
        id: pack
        shell: pwsh
        run: |
          $Version = "${{ steps.version.outputs.VERSION }}"

          # Copy outputs to where .nuspec expects them
          $NuspecDir = "NNN-Solution/NNNCSharp"
          New-Item -ItemType Directory -Force "$NuspecDir/bin/x64/ReleasePackage" | Out-Null
          Copy-Item "${{ steps.outputs.outputs.MANAGED }}" "$NuspecDir/bin/x64/ReleasePackage/"
          Copy-Item "${{ steps.outputs.outputs.NATIVE }}" "$NuspecDir/bin/x64/ReleasePackage/"

          nuget pack "$NuspecDir/NNNCSharp.nuspec" `
            -Version $Version `
            -OutputDirectory nuget-output `
            -Properties "version=$Version"

          $PackagePath = (Get-ChildItem "nuget-output/*.nupkg" | Select-Object -First 1).FullName
          echo "PACKAGE_PATH=$PackagePath" >> $env:GITHUB_OUTPUT

      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: FlyingArthur

      - name: Push NuGet package
        shell: pwsh
        run: |
            nuget push "${{ steps.pack.outputs.PACKAGE_PATH }}" `
            -Source https://nuget.org `
            -ApiKey ${{ steps.nuget-login.outputs.NUGET_API_KEY }} `
            -SkipDuplicate

      - name: Prepare UPM package
        shell: pwsh
        run: |
          $Version = "${{ steps.version.outputs.VERSION }}"
          $Tag = "${{ steps.version.outputs.TAG }}"

          $PackageJson = Get-Content "upm/package.json" | ConvertFrom-Json
          $PackageJson.version = $Version
          $PackageJson | ConvertTo-Json -Depth 10 | Set-Content "upm/package.json"

          Copy-Item "${{ steps.outputs.outputs.MANAGED }}" "upm/Runtime/NNNCSharp.dll"
          Copy-Item "${{ steps.outputs.outputs.NATIVE }}" "upm/Runtime/NNN.dll"
          Copy-Item $env:GITHUB_WORKSPACE/LICENSE.txt "upm/"
          Copy-Item $env:GITHUB_WORKSPACE/README.md "upm/"

          Compress-Archive -Path upm/* -DestinationPath "NNN-UPM-$Tag.zip"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout --orphan upm-deploy
          git rm -rf . --quiet
          Copy-Item -Recurse upm/* . -Force
          git add -A
          git commit -m "UPM release $Tag"
          git tag "upm-$Tag"
          git push origin upm-deploy:upm --force
          git push origin "upm-$Tag"

          git checkout -

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            NNN-${{ github.ref_name }}.zip
            nuget-output/*.nupkg
            NNN-UPM-${{ steps.version.outputs.TAG }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
